name: docker
services:
  api:
    build:
      context: /home/ken/fidscript-deploy
      dockerfile: apps/api/Dockerfile
    container_name: fidscript_api
    depends_on:
      minio:
        condition: service_healthy
        required: true
      nats:
        condition: service_healthy
        required: true
      pgbouncer:
        condition: service_healthy
        required: true
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ADMIN_EMAIL: admin@deploy.fidscript.com
      ADMIN_PASSWORD: admin123
      API_PORT: "3001"
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/cf_api_token
      CORS_ORIGIN: https://app.deploy.fidscript.com
      DATABASE_URL: postgresql://fidscript:aba9475e146acee86b92ef5b0c6be44321902a908f3d77982225d05eb1cd076a@pgbouncer:6432/fidscript?pgbouncer=true
      DB_ADMIN_DATABASE: fidscript
      DB_ADMIN_HOST: postgres
      DB_ADMIN_PASSWORD_FILE: /run/secrets/postgres_password
      DB_ADMIN_PORT: "5432"
      DB_ADMIN_USER: fidscript
      DIRECT_URL: postgresql://fidscript:aba9475e146acee86b92ef5b0c6be44321902a908f3d77982225d05eb1cd076a@postgres:5432/fidscript
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      GITHUB_CLIENT_ID: Ov23liZ0i2zwloJiz5OQ
      GITHUB_CLIENT_SECRET: 47aa6b5eec9b68933c7cc83c8ca321b062f3f6e9
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      MINIO_ACCESS_KEY: 075382569cc56b03c554844b0f55986edf3b2442f705a8b1e9f78991f3bd0878
      MINIO_ENDPOINT: minio:9000
      MINIO_EXTERNAL_ENDPOINT: https://storage.deploy.fidscript.com
      MINIO_PORT: "9000"
      MINIO_SECRET_KEY: f20572f0d4245de4d9d2e35e4ba55cbc0719224cadc4ffc057dbb824184a7105
      NATS_URL: nats://nats:4222
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "6432"
      PLATFORM_DOMAIN: deploy.fidscript.com
      PLATFORM_MAIL_HOST: mail.deploy.fidscript.com
      PLATFORM_PUBLIC_URL: https://api.deploy.fidscript.com
      POSTGRES_PASSWORD: aba9475e146acee86b92ef5b0c6be44321902a908f3d77982225d05eb1cd076a
      REDIS_PASSWORD: 5f45e250b9ae87465d0ec6b2241824308b24acc1abccc165d2d96adb6d3f6a1e
      REDIS_URL: redis://:5f45e250b9ae87465d0ec6b2241824308b24acc1abccc165d2d96adb6d3f6a1e@redis:6379
      SERVER_IP: 72.61.89.110
      SMTP_FROM: admin@deploy.fidscript.com
      SMTP_SUBMISSION_PASS: Tqu6QQHLg8AIGK5x
      SMTP_SUBMISSION_USER: admin@deploy.fidscript.com
      STALWART_ADMIN_TOKEN_FILE: /run/secrets/stalwart_admin_token
      STALWART_JMAP_URL: http://fidscript_stalwart:8080/
      STALWART_SMTP_HOST: fidscript_stalwart
      STALWART_SMTP_PORT: "465"
      STALWART_WEBHOOK_SECRET_FILE: /run/secrets/stalwart_webhook_secret
      SYSTEM_MAILBOX_PASSWORD: h6xq8wrUT3aWq3trVTZ8GYadwh6yFMg
    group_add:
      - "988"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:3001/api/v1/health > /dev/null || exit 1
      timeout: 5s
      interval: 15s
      retries: 5
      start_period: 30s
    networks:
      fidscript: null
      fidscript-app: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/secrets
        target: /run/secrets
        read_only: true
        bind: {}
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/scripts
        target: /usr/local/share/fidscript
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/traefik/dynamic.yml
        target: /etc/traefik/dynamic.yml
        bind: {}
  bootstrap:
    command:
      - |
        set -e
        apk add --no-cache postgresql-client > /dev/null 2>&1

        echo "Waiting for PostgreSQL..."
        until pg_isready -h postgres -U fidscript -d fidscript > /dev/null 2>&1; do
          sleep 1
        done

        echo "Database ready. Bootstrap complete."
        exit 0
    container_name: fidscript_bootstrap
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    entrypoint:
      - /bin/sh
      - -c
    image: alpine:3.19
    networks:
      fidscript: null
    restart: "no"
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/secrets
        target: /run/secrets
        read_only: true
        bind: {}
      - type: volume
        source: fidscript_secrets
        target: /secrets
        volume: {}
      - type: volume
        source: fidscript_config
        target: /config
        volume: {}
  dashboard:
    build:
      context: /home/ken/fidscript-deploy
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.deploy.fidscript.com
        NEXT_PUBLIC_PLATFORM_DOMAIN: deploy.fidscript.com
    container_name: fidscript_dashboard
    depends_on:
      api:
        condition: service_started
        required: true
    environment:
      NEXT_PUBLIC_API_URL: https://api.deploy.fidscript.com
      NEXT_PUBLIC_PLATFORM_DOMAIN: deploy.fidscript.com
    networks:
      fidscript: null
    restart: unless-stopped
  docker-proxy:
    command:
      - node
      - /proxy.js
    container_name: fidscript_docker_tcp
    image: node:20-alpine
    networks:
      fidscript: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/docker-version-proxy.js
        target: /proxy.js
        read_only: true
        bind: {}
    working_dir: /
  minio:
    command:
      - server
      - /data
      - --console-address
      - :9001
    container_name: fidscript_minio
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      timeout: 5s
      interval: 10s
      retries: 5
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    networks:
      fidscript: null
    restart: unless-stopped
    secrets:
      - source: minio_access_key
        target: /run/secrets/minio_access_key
      - source: minio_secret_key
        target: /run/secrets/minio_secret_key
    volumes:
      - type: volume
        source: fidscript_minio
        target: /data
        volume: {}
  nats:
    command:
      - -c
      - /etc/nats/nats-server.conf
    container_name: fidscript_nats
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:8222/healthz || exit 1
      timeout: 5s
      interval: 10s
      retries: 5
    image: nats:2.10-alpine
    networks:
      fidscript: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/config/nats-server.conf
        target: /etc/nats/nats-server.conf
        read_only: true
        bind: {}
      - type: volume
        source: fidscript_nats
        target: /data
        volume: {}
  pgbouncer:
    command:
      - |
        set -e
        PGIP=$$(getent hosts postgres | awk '{print $$1}' | head -1)
        echo "[entrypoint] resolved postgres -> $${PGIP}"
        sed "s/host=postgres/host=$${PGIP}/g" /etc/pgbouncer/pgbouncer.ini > /tmp/pgbouncer.ini
        exec /opt/pgbouncer/pgbouncer /tmp/pgbouncer.ini
    container_name: fidscript_pgbouncer
    depends_on:
      postgres:
        condition: service_healthy
        required: true
    entrypoint:
      - /bin/sh
      - -c
    environment:
      GITHUB_CLIENT_ID: Ov23liZ0i2zwloJiz5OQ
      GITHUB_CLIENT_SECRET: 47aa6b5eec9b68933c7cc83c8ca321b062f3f6e9
      MINIO_ACCESS_KEY: 075382569cc56b03c554844b0f55986edf3b2442f705a8b1e9f78991f3bd0878
      MINIO_SECRET_KEY: f20572f0d4245de4d9d2e35e4ba55cbc0719224cadc4ffc057dbb824184a7105
      POSTGRES_PASSWORD: aba9475e146acee86b92ef5b0c6be44321902a908f3d77982225d05eb1cd076a
      REDIS_PASSWORD: 5f45e250b9ae87465d0ec6b2241824308b24acc1abccc165d2d96adb6d3f6a1e
      SMTP_SUBMISSION_PASS: 6ba59cfc66d67f75b5be64219a37ea3126cee8af09e709f3f903c2581e442771
      SMTP_SUBMISSION_USER: submission@deploy.fidscript.com
      SYSTEM_MAILBOX_PASSWORD: h6xq8wrUT3aWq3trVTZ8GYadwh6yFMg
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z localhost 6432 || exit 1
      timeout: 5s
      interval: 10s
      retries: 5
    image: pgbouncer/pgbouncer:1.15.0
    networks:
      fidscript: null
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/pgbouncer.ini
        target: /etc/pgbouncer/pgbouncer.ini
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/userlist.txt
        target: /etc/pgbouncer/userlist.txt
        read_only: true
        bind: {}
  postgres:
    container_name: fidscript_postgres
    environment:
      POSTGRES_DB: fidscript
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: fidscript
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U fidscript -d fidscript
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:16-alpine
    networks:
      fidscript: null
    restart: unless-stopped
    secrets:
      - source: postgres_password
        target: /run/secrets/postgres_password
    volumes:
      - type: volume
        source: fidscript_postgres
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    command:
      - sh
      - -c
      - exec redis-server --requirepass "$$(cat /run/secrets/redis_password)" --appendonly yes
    container_name: fidscript_redis
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$(cat /run/secrets/redis_password)" --no-auth-warning ping
      timeout: 5s
      interval: 10s
      retries: 5
    image: redis:7-alpine
    networks:
      fidscript: null
    restart: unless-stopped
    secrets:
      - source: redis_password
        target: /run/secrets/redis_password
    volumes:
      - type: volume
        source: fidscript_redis
        target: /data
        volume: {}
  stalwart:
    command:
      - --config
      - /etc/stalwart/config.json
    container_name: fidscript_stalwart
    environment:
      STALWART_RECOVERY_ADMIN: admin:7230f0d00120951ccadfa869b54fb642a3f97fd10da166a6cb8ff892e63275a4
    healthcheck:
      test:
        - CMD-SHELL
        - timeout 2 bash -c 'exec 3<>/dev/tcp/localhost/8080' >/dev/null 2>&1 || exit 1
      timeout: 5s
      interval: 15s
      retries: 10
      start_period: 30s
    image: stalwartlabs/stalwart:v0.16.10
    networks:
      fidscript: null
    ports:
      - mode: ingress
        target: 25
        published: "25"
        protocol: tcp
      - mode: ingress
        target: 465
        published: "465"
        protocol: tcp
      - mode: ingress
        target: 993
        published: "993"
        protocol: tcp
      - mode: ingress
        host_ip: 127.0.0.1
        target: 8080
        published: "8090"
        protocol: tcp
    restart: unless-stopped
    secrets:
      - source: stalwart_admin_token
        target: /run/secrets/stalwart_admin_token
      - source: stalwart_credentials
        target: /run/secrets/stalwart_credentials
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/config/stalwart/config.json
        target: /etc/stalwart/config.json
        read_only: true
        bind: {}
      - type: volume
        source: fidscript_stalwart
        target: /var/lib/stalwart
        volume: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/secrets/stalwart_admin_token.txt
        target: /run/secrets/stalwart_admin_token
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/secrets/stalwart_credentials.txt
        target: /run/secrets/stalwart_credentials
        read_only: true
        bind: {}
  traefik:
    container_name: fidscript_traefik
    environment:
      CLOUDFLARE_DNS_API_TOKEN_FILE: /run/secrets/cf_api_token
    image: traefik:v3.3
    networks:
      fidscript: null
      fidscript-app: null
      soostori-prod-net: null
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
      - mode: ingress
        target: 443
        published: "443"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/traefik/traefik.yml
        target: /etc/traefik/traefik.yml
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/traefik/dynamic.yml
        target: /etc/traefik/dynamic.yml
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/traefik/certs
        target: /certs
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/secrets
        target: /run/secrets
        read_only: true
        bind: {}
      - type: volume
        source: fidscript_acme_dns
        target: /acme-dns
        volume: {}
      - type: volume
        source: fidscript_acme_http
        target: /acme-http
        volume: {}
  whatsapp-frontend:
    container_name: fidscript_whatsapp_frontend
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost/ || exit 1
      timeout: 5s
      interval: 10s
      retries: 3
    image: nginx:alpine
    networks:
      nextmavens-net:
        ipv4_address: 172.18.0.10
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/whatsapp-frontend.dist
        target: /usr/share/nginx/html
        read_only: true
        bind: {}
      - type: bind
        source: /home/ken/fidscript-deploy/installer/docker/whatsapp-frontend.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind: {}
networks:
  fidscript:
    name: fidscript
    driver: bridge
  fidscript-app:
    name: fidscript-app
    driver: bridge
  nextmavens-net:
    name: nextmavens-net
    external: true
  soostori-prod-net:
    name: soostori-prod-net
    external: true
volumes:
  fidscript_acme_dns:
    name: fidscript_acme_dns
  fidscript_acme_http:
    name: fidscript_acme_http
  fidscript_config:
    name: fidscript_config
  fidscript_minio:
    name: fidscript_minio
  fidscript_nats:
    name: fidscript_nats
  fidscript_postgres:
    name: fidscript_postgres
  fidscript_redis:
    name: fidscript_redis
  fidscript_secrets:
    name: fidscript_secrets
  fidscript_stalwart:
    name: fidscript_stalwart
secrets:
  minio_access_key:
    name: docker_minio_access_key
    file: /home/ken/fidscript-deploy/installer/docker/secrets/minio_access_key.txt
  minio_secret_key:
    name: docker_minio_secret_key
    file: /home/ken/fidscript-deploy/installer/docker/secrets/minio_secret_key.txt
  postgres_password:
    name: docker_postgres_password
    file: /home/ken/fidscript-deploy/installer/docker/secrets/postgres_password.txt
  redis_password:
    name: docker_redis_password
    file: /home/ken/fidscript-deploy/installer/docker/secrets/redis_password.txt
  stalwart_admin_token:
    name: docker_stalwart_admin_token
    file: /home/ken/fidscript-deploy/installer/docker/secrets/stalwart_admin_token.txt
  stalwart_credentials:
    name: docker_stalwart_credentials
    file: /home/ken/fidscript-deploy/installer/docker/secrets/stalwart_credentials.txt
