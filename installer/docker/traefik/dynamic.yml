http:
  routers:
    fidscript-api:
      rule: "Host(`api.deploy.fidscript.com`)"
      service: fidscript-api
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-dns

    fidscript-dashboard:
      rule: "Host(`deploy.fidscript.com`)"
      service: fidscript-dashboard
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt-dns

  services:
    fidscript-api:
      loadBalancer:
        servers:
          - url: "http://10.0.3.9:3001"

    fidscript-dashboard:
      loadBalancer:
        servers:
          - url: "http://10.0.3.10:3001"
