api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt-dns:
    acme:
      email: admin@deploy.fidscript.com
      storage: /acme-dns/acme-dns.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1"
          - "1.0.0.1"
      caServer: https://acme-v02.api.letsencrypt.org/directory

  letsencrypt-http:
    acme:
      email: admin@deploy.fidscript.com
      storage: /acme-http/acme-http.json
      httpChallenge:
        entryPoint: web
      caServer: https://acme-v02.api.letsencrypt.org/directory

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
  # Docker provider — via a socat TCP proxy that bridges the raw unix socket
  # to TCP. Over TCP the Go Docker client negotiates the API version
  # automatically (unlike the raw socket where it pins to 1.24).
  docker:
    endpoint: "http://fidscript_docker_tcp:2375"
    exposedByDefault: false
    network: fidscript-app
