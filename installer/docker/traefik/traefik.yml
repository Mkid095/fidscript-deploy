api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

# ─────────────────────────────────────────────────────────────
# Certificate resolvers
# ─────────────────────────────────────────────────────────────
#
# 1. letsencrypt-dns — DNS-01 challenge via Cloudflare
#    Issues wildcards (*.apps.deploy.fidscript.com) and any
#    domain where we control DNS (deploy.fidscript.com zone).
#    Requires CF_API_TOKEN env var in the Traefik container.
#
# 2. letsencrypt-http — HTTP-01 challenge fallback
#    For custom domains where the user points their DNS CNAME
#    to our server IP but we don't control their zone.
#    Requires port 80 to be reachable from Let's Encrypt servers.
#
certificatesResolvers:
  letsencrypt-dns:
    acme:
      email: admin@deploy.fidscript.com
      storage: /acme-dns/acme-dns.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1"
          - "1.0.0.1"
      # Production ACME endpoint — do not change
      caServer: https://acme-v02.api.letsencrypt.org/directory

  letsencrypt-http:
    acme:
      email: admin@deploy.fidscript.com
      storage: /acme-http/acme-http.json
      httpChallenge:
        entryPoint: web
      caServer: https://acme-v02.api.letsencrypt.org/directory

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true
  # Docker provider — discovers deployed app containers by their traefik.*
  # labels. Only containers with traefik.enable=true are exposed (per-container
  # Host rules set by DockerBuildArgsService). Restricted to the fidscript-app
  # network so platform infrastructure containers aren't surfaced.
  docker:
    exposedByDefault: false
    network: fidscript-app
