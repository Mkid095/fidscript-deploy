version: "3.9"

services:
  traefik:
    image: traefik:v3.0
    container_name: fidscript_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/certs:ro
      - ./secrets:/run/secrets:ro
      - fidscript_acme_dns:/acme-dns
      - fidscript_acme_http:/acme-http
    environment:
      CF_API_TOKEN_FILE: /run/secrets/cf_api_token
    networks:
      - fidscript
      - fidscript-app

  postgres:
    image: postgres:16-alpine
    container_name: fidscript_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidscript
      POSTGRES_USER: fidscript
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - fidscript_postgres:/var/lib/postgresql/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidscript -d fidscript"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: dhi.io/pgbouncer:alpine
    container_name: fidscript_pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://fidscript@fidscript_postgres:5432/fidscript"
    env_file:
      - ./secrets/api.env
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - fidscript
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U fidscript"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fidscript_redis
    restart: unless-stopped
    command: redis-server --requirepass-file /run/secrets/redis_password --appendonly yes
    secrets:
      - redis_password
    volumes:
      - fidscript_redis:/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$$(cat /run/secrets/redis_password)", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: fidscript_nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ./config/nats-server.conf:/etc/nats/nats-server.conf:ro
      - fidscript_nats:/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD", "nats", "server", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: fidscript_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    volumes:
      - fidscript_minio:/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  stalwart:
    image: stalwartlabs/mail-server:latest
    container_name: fidscript_stalwart
    restart: unless-stopped
    environment:
      - STA_LICENSE_KEY=
      - STA_DATA_DIR=/data
      - STA_CONFIG_FILE=/etc/stalwart/main.toml
      - STA_ADMIN_TOKEN_FILE=/run/secrets/stalwart_admin_token
    ports:
      - "127.0.0.1:25:25"       # SMTP inbound (VPS firewall must allow)
      - "127.0.0.1:465:465"      # SMTPS submission
      - "127.0.0.1:587:587"      # SMTP submission (submission)
      - "127.0.0.1:993:993"      # IMAPS
      - "127.0.0.1:8443:443"     # JMAP / management HTTP(S)
    volumes:
      - ./config/stalwart:/etc/stalwart:ro
      - ./config/stalwart/tls:/certs:ro   # TLS certs mounted here
      - fidscript_stalwart:/data
      - ./secrets/stalwart_admin_token.txt:/run/secrets/stalwart_admin_token:ro
    networks:
      - fidscript
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: fidscript_api
    restart: unless-stopped
    # Read *_FILE env vars and materialize them before starting node
    env_file:
      - ./secrets/api.env
    environment:
      DATABASE_URL: postgresql://fidscript:${POSTGRES_PASSWORD}@pgbouncer:6432/fidscript?pgbouncer=true
      DIRECT_URL: postgresql://fidscript:${POSTGRES_PASSWORD}@postgres:5432/fidscript
      DB_ADMIN_USER: fidscript
      DB_ADMIN_PASSWORD_FILE: /run/secrets/postgres_password
      DB_ADMIN_HOST: postgres
      DB_ADMIN_PORT: "5432"
      DB_ADMIN_DATABASE: fidscript
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "6432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_PORT: "9000"
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      API_PORT: "3001"
      SERVER_IP: ${SERVER_IP}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-deploy.fidscript.com}
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/cf_api_token
    secrets:
      - postgres_password
      - redis_password
      - minio_access_key
      - minio_secret_key
      - jwt_secret
      - encryption_key
      - cf_api_token
    volumes:
      - ./secrets:/run/secrets:ro
    networks:
      - fidscript
      - fidscript-app
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    container_name: fidscript_dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NEXT_PUBLIC_PLATFORM_URL: https://${DOMAIN}
    networks:
      - fidscript
    depends_on:
      - api

  bootstrap:
    image: alpine:3.19
    container_name: fidscript_bootstrap
    restart: "no"
    volumes:
      - ./secrets:/run/secrets:ro
      - fidscript_secrets:/secrets
      - fidscript_config:/config
    networks:
      - fidscript
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache postgresql-client > /dev/null 2>&1

        echo "Waiting for PostgreSQL..."
        until pg_isready -h postgres -U fidscript -d fidscript > /dev/null 2>&1; do
          sleep 1
        done

        echo "Database ready. Bootstrap complete."
        exit 0

networks:
  fidscript:
    name: fidscript
    driver: bridge
  fidscript-app:
    name: fidscript-app
    driver: bridge

volumes:
  fidscript_postgres:
    name: fidscript_postgres
  fidscript_redis:
    name: fidscript_redis
  fidscript_nats:
    name: fidscript_nats
  fidscript_minio:
    name: fidscript_minio
  fidscript_stalwart:
    name: fidscript_stalwart
  fidscript_acme_dns:
    name: fidscript_acme_dns
  fidscript_acme_http:
    name: fidscript_acme_http
  fidscript_secrets:
    name: fidscript_secrets
  fidscript_config:
    name: fidscript_config

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  cf_api_token:
    file: ./secrets/cf_api_token.txt
  stalwart_admin_token:
    file: ./secrets/stalwart_admin_token.txt