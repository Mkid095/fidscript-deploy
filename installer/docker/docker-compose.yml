services:
  # Docker socket → TCP proxy. Traefik's Go Docker client pins to API 1.24
  # over the raw socket (which the modern daemon rejects, min 1.40). This tiny
  # Node.js proxy rewrites the API version in the URL path (v1.24 → v1.41).
  docker-proxy:
    image: node:20-alpine
    container_name: fidscript_docker_tcp
    restart: unless-stopped
    working_dir: /
    command: node /proxy.js
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-version-proxy.js:/proxy.js:ro
    networks:
      - fidscript

  traefik:
    # v3.2+ fixes the Docker provider API version negotiation bug
    # (v3.0.x pins to API 1.24 which modern daemons reject).
    image: traefik:v3.3
    container_name: fidscript_traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:rw
      - ./traefik/certs:/certs:ro
      - ./secrets:/run/secrets:ro
      - fidscript_acme_dns:/acme-dns
      - fidscript_acme_http:/acme-http
    environment:
      CLOUDFLARE_DNS_API_TOKEN_FILE: /run/secrets/cf_api_token
    networks:
      - fidscript
      - fidscript-app
      - soostori-prod-net

  postgres:
    image: postgres:16-alpine
    container_name: fidscript_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fidscript
      POSTGRES_USER: fidscript
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - fidscript_postgres:/var/lib/postgresql/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidscript -d fidscript"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: pgbouncer/pgbouncer:1.15.0
    container_name: fidscript_pgbouncer
    restart: unless-stopped
    # Bypass the image's entrypoint script (which demands DATABASES env).
    # The pgbouncer binary lives at /opt/pgbouncer/pgbouncer (not in $PATH).
    # We run a tiny shell wrapper that resolves `postgres` -> its current IP
    # at startup and substitutes it into a temp copy of pgbouncer.ini before
    # launching pgbouncer. This is required because (a) the committed ini uses
    # the `postgres` service name as a placeholder, and (b) pgbouncer's c-ares
    # resolver cannot parse the single-label docker name ("Misformatted domain
    # name"). Resolving via getent (system resolver) at boot keeps the backend
    # host dynamic — it survives postgres recreates (which change its IP),
    # unlike a hardcoded literal IP which breaks on every recreate.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        PGIP=$$(getent hosts postgres | awk '{print $$1}' | head -1)
        echo "[entrypoint] resolved postgres -> $${PGIP}"
        sed "s/host=postgres/host=$${PGIP}/g" /etc/pgbouncer/pgbouncer.ini > /tmp/pgbouncer.ini
        exec /opt/pgbouncer/pgbouncer /tmp/pgbouncer.ini
    env_file:
      - ./secrets/api.env
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - fidscript
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fidscript_redis
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --requirepass \"$(cat /run/secrets/redis_password)\" --appendonly yes"]
    secrets:
      - redis_password
    volumes:
      - fidscript_redis:/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$(cat /run/secrets/redis_password)\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: fidscript_nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - ../config/nats-server.conf:/etc/nats/nats-server.conf:ro
      - fidscript_nats:/data
    networks:
      - fidscript
    # The nats CLI isn't in PATH in this alpine image, so "nats server ping"
    # fails. The proper healthcheck is the nats HTTP monitoring endpoint.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    # Pinned: RELEASE.2025-09-07T16-13-09Z (Sept 2025 stable). Avoid
    # :latest — it has been known to break MinIO client compatibility.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: fidscript_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    volumes:
      - fidscript_minio:/data
    networks:
      - fidscript
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  stalwart:
    # Pinned to a specific version via STALWART_VERSION in .env.
    # New installations get the newest stable; existing deployments stay pinned
    # for reproducible rollbacks. Update STALWART_VERSION in .env and re-pull
    # to upgrade: docker compose up -d stalwart
    # v0.16.x includes JMAP-based management (Principal/set for role assignment)
    # and database-keyed config (many former TOML keys now live in RocksDB).
    image: stalwartlabs/stalwart:${STALWART_VERSION:-v0.16.10}
    container_name: fidscript_stalwart
    restart: unless-stopped
    # Mail ports published to the host so external MTAs can deliver inbound
    # (25) and users/clients can submit (465/587) and read mail (143/993).
    # Without port 25 published, the MX record points at a closed port and
    # no external mail arrives. The firewall (configure-firewall.sh) must
    # also allow these — publishing alone is not enough.
    ports:
      - "25:25"     # SMTP  — inbound MX (server-to-server delivery)
      - "465:465"   # SMTPS — implicit-TLS submission
      - "993:993"   # IMAPS — implicit-TLS
      - "127.0.0.1:8090:8080"  # Admin UI / JMAP (local only; routed via Traefik)
    # Stalwart reads its config from /etc/stalwart/config.json,
    # which the image's entrypoint creates on first start if absent.
    # By pre-mounting our rendered config.toml to the same path, the
    # entrypoint's "if not exists" check is satisfied and our file
    # wins. This is the only way to ship a non-default config without
    # forking the image.
    environment:
      # Bootstrap mode recovery admin — use the token from secrets as password.
      # Format: username:password (password is the raw token, not hashed).
      - STALWART_RECOVERY_ADMIN=admin:7230f0d00120951ccadfa869b54fb642a3f97fd10da166a6cb8ff892e63275a4
    volumes:
      # Mount config file for SMTP/JMAP/HTTP services.
      - ../config/stalwart/config.json:/etc/stalwart/config.json:ro
      - fidscript_stalwart:/var/lib/stalwart
      - ./secrets/stalwart_admin_token.txt:/run/secrets/stalwart_admin_token:ro
      - ./secrets/stalwart_credentials.txt:/run/secrets/stalwart_credentials:ro
    command: --config /etc/stalwart/config.json
    networks:
      - fidscript
    # NOTE: no depends_on — Stalwart uses RocksDB on its own volume
    # and doesn't need postgres. Keeping it in the depends_on chain
    # would block Stalwart start if postgres is slow to come up, even
    # though they have no runtime dependency.
    healthcheck:
      # The Stalwart image is intentionally minimal: no curl, no
      # wget, no nc. The only way to do an in-container check is
      # bash's /dev/tcp. We open a TCP connection to the JMAP HTTP
      # port (8080), close it, and exit 0 if the open succeeded.
      # `cat </dev/tcp/...` would block reading until EOF (HTTP
      # servers keep connections open), so we use exec-with-fd.
      test:
        - "CMD-SHELL"
        - "timeout 2 bash -c 'exec 3<>/dev/tcp/localhost/8080' >/dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    secrets:
      - stalwart_admin_token
      - stalwart_credentials

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: fidscript_api
    restart: unless-stopped
    # Read *_FILE env vars and materialize them before starting node
    env_file:
      - ./secrets/api.env
    environment:
      # First-run admin seed (consumed by apps/api/prisma/seed.ts via ADMIN_EMAIL/ADMIN_PASSWORD).
      # The seed runs on every container start (entrypoint.sh line 56) and is idempotent —
      # if the admin user already exists, it skips. ponytail: this is the minimum
      # needed for the dashboard's login to work end-to-end; the full F03 onboarding
      # flow will replace this with a proper install wizard.
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: postgresql://fidscript:${POSTGRES_PASSWORD}@pgbouncer:6432/fidscript?pgbouncer=true
      DIRECT_URL: postgresql://fidscript:${POSTGRES_PASSWORD}@postgres:5432/fidscript
      DB_ADMIN_USER: fidscript
      DB_ADMIN_PASSWORD_FILE: /run/secrets/postgres_password
      DB_ADMIN_HOST: postgres
      DB_ADMIN_PORT: "5432"
      DB_ADMIN_DATABASE: fidscript
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: "6432"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_PORT: "9000"
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      API_PORT: "3001"
      CORS_ORIGIN: https://app.${PLATFORM_DOMAIN:-deploy.fidscript.com}
      SERVER_IP: ${SERVER_IP}
      PLATFORM_DOMAIN: ${PLATFORM_DOMAIN:-deploy.fidscript.com}
      PLATFORM_PUBLIC_URL: https://api.${PLATFORM_DOMAIN:-deploy.fidscript.com}
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/cf_api_token
      # Stalwart / Email
      # StalwartJmapService appends '/jmap' to baseURL on every call,
      # so the base must be the HTTP listener root (port 8080),
      # NOT the /jmap path. The trailing slash is required.
      STALWART_JMAP_URL: http://fidscript_stalwart:8080/
      STALWART_ADMIN_TOKEN_FILE: /run/secrets/stalwart_admin_token
      STALWART_SMTP_HOST: fidscript_stalwart
      STALWART_SMTP_PORT: "465"
      PLATFORM_MAIL_HOST: ${PLATFORM_MAIL_HOST:-mail.deploy.fidscript.com}
      # Use parent domain (deploy.fidscript.com) as sender — it has the
      # SPF/DKIM/DMARC records. The mail. subdomain has no DNS auth records.
      SMTP_FROM: admin@${PLATFORM_DOMAIN}
      SMTP_SUBMISSION_USER: ${SMTP_SUBMISSION_USER}
      SMTP_SUBMISSION_PASS: ${SMTP_SUBMISSION_PASS}
      STALWART_WEBHOOK_SECRET_FILE: /run/secrets/stalwart_webhook_secret
    # NOTE: no Docker-secrets block for the api. The Docker-secrets mechanism
    # mounts the secret files with root-0400 perms, which the api (running as
    # `node`, uid 1000) cannot read ("Permission denied"). Instead, we bind-
    # mount the host secrets dir (chmod 755 dir + 644 files) so the entrypoint's
    # `cat /run/secrets/<name>` works. The other services (traefik/stalwart)
    # run as root and keep the Docker-secrets mechanism.
    volumes:
      - ./secrets:/run/secrets:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ../scripts:/usr/local/share/fidscript:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:rw
    # The deployment worker runs `docker build`/`docker run` against the host
    # daemon via the mounted socket. The socket is root:docker on the host
    # (host GID in DOCKER_GID); adding that GID here grants the non-root
    # `node` user (uid 1000) read/write access without running as root.
    group_add:
      - "${DOCKER_GID}"
    networks:
      - fidscript
      - fidscript-app
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # curl is installed in the runtime stage (see apps/api/Dockerfile).
      # The health route is /api/v1/health (NestJS global prefix).
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/api/v1/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_PLATFORM_DOMAIN: ${DOMAIN}
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    container_name: fidscript_dashboard
    restart: unless-stopped
    # NEXT_PUBLIC_* vars are read at runtime by client components (see
    # apps/dashboard/src/lib/sdk.ts). Build args alone are NOT enough — Next.js
    # standalone doesn't bake them into the client bundle for runtime reads.
    # Mirror them as runtime env so the SDK can resolve the API base URL.
    environment:
      NEXT_PUBLIC_PLATFORM_DOMAIN: ${DOMAIN}
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    networks:
      - fidscript
    depends_on:
      - api

  bootstrap:
    image: alpine:3.19
    container_name: fidscript_bootstrap
    restart: "no"
    volumes:
      - ./secrets:/run/secrets:ro
      - fidscript_secrets:/secrets
      - fidscript_config:/config
    networks:
      - fidscript
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache postgresql-client > /dev/null 2>&1

        echo "Waiting for PostgreSQL..."
        until pg_isready -h postgres -U fidscript -d fidscript > /dev/null 2>&1; do
          sleep 1
        done

        echo "Database ready. Bootstrap complete."
        exit 0

  whatsapp-frontend:
    image: nginx:alpine
    container_name: fidscript_whatsapp_frontend
    restart: unless-stopped
    volumes:
      - ./whatsapp-frontend.dist:/usr/share/nginx/html:ro
      - ./whatsapp-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      nextmavens-net:
        ipv4_address: 172.18.0.10
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # WhatsApp SaaS Platform API
  whatsapp-api:
    image: fidscript-whatsapp-api:latest
    container_name: fidscript-whatsapp-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3099"
      CORS_ORIGIN: "*"
      PLATFORM_URL: https://whatsapp.fidscript.com
      API_URL: https://api.whatsapp.fidscript.com
      API_INTERNAL_URL: http://fidscript-whatsapp-api:3099
      EVOLUTION_API_URL: http://nextmavens_evolution:8080
      EVOLUTION_API_KEY: 94977bc1fcb107c79d0687caea800bdb74edd67b5022771fc85c22ee389ca7e8
      TUMA_BUSINESS_EMAIL: nextmavensoffice@gmail.com
      TUMA_API_KEY: tuma_22e5d0fff7b75e46b82bdb1cd6b31ee78dc209b58a7c8e177fed6d0b78890fd3_1781442356
      RESEND_API_KEY: re_2ZVSvdru_LENCaWda3nsgfTnhqRnHRdWy
      MAIL_FROM: "FIDScript <noreply@whatsapp.fidscript.com>"
      DEPLOY_VERSION: "1.0.0"
    networks:
      fidscript-app:
      fidscript:
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3099/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  fidscript:
    name: fidscript
    driver: bridge
  fidscript-app:
    name: fidscript-app
    driver: bridge
  soostori-prod-net:
    external: true
  nextmavens-net:
    external: true

volumes:
  fidscript_postgres:
    name: fidscript_postgres
  fidscript_redis:
    name: fidscript_redis
  fidscript_nats:
    name: fidscript_nats
  fidscript_minio:
    name: fidscript_minio
  fidscript_stalwart:
    name: fidscript_stalwart
  fidscript_acme_dns:
    name: fidscript_acme_dns
  fidscript_acme_http:
    name: fidscript_acme_http
  fidscript_secrets:
    name: fidscript_secrets
  fidscript_config:
    name: fidscript_config

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  minio_access_key:
    file: ./secrets/minio_access_key.txt
  minio_secret_key:
    file: ./secrets/minio_secret_key.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  cf_api_token:
    file: ./secrets/cf_api_token.txt
  stalwart_admin_token:
    file: ./secrets/stalwart_admin_token.txt
  stalwart_webhook_secret:
    file: ./secrets/stalwart_webhook_secret.txt
  stalwart_credentials:
    file: ./secrets/stalwart_credentials.txt