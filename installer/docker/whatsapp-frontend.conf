server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster transfers
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # SPA routing — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must NEVER be cached, else new deploys serve stale bundle hashes
    # → users get a blank page / failed asset loads that look like downtime
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # Hashed asset files are immutable — cache aggressively (filename changes on every build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # API proxy to the Express backend
    location /api/ {
        proxy_pass http://fidscript-whatsapp-api:3099;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
