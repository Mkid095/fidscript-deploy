[databases]
; Per-database entries are added dynamically by the platform.
; Format: dbname = host=... port=... dbname=...
; Default postgres for the platform DB (fidscript).
;
; The backend host MUST stay dynamic (the `postgres` service name), NOT a
; literal IP. A literal IP breaks the moment postgres is recreated (it gets
; a new IP and pgbouncer points at a dead address). The compose entrypoint
; resolves `postgres` -> IP at container start and rewrites this line before
; pgbouncer launches, so it survives recreates without manual edits.
fidscript = host=postgres port=5432 dbname=fidscript

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
# verbose logging (so we can see backend-auth errors during bring-up);
# set to 0 once everything is working.
verbose = 1
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
ignore_startup_parameters = extra_float_digits
