[databases]
; Per-database entries are added dynamically by the platform.
; Format: dbname = host=... port=... dbname=...
; Default postgres for the platform DB (fidscript).
;
; The backend host is pinned to postgres's IP on the fidscript network.
; Pgbouncer's c-ares resolver can't parse the short docker service name
; "postgres" ("Misformatted domain name" / result=0) even though the
; system resolver (getent) handles it fine — a known pgbouncer+c-ares+docker
; DNS issue. Using the IP (verified reachable from pgbouncer) avoids it.
; The IP is stable for a running stack; if postgres is recreated, look it
; up with `docker inspect fidscript_postgres` and update this line.
fidscript = host=10.0.3.4 port=5432 dbname=fidscript

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
# verbose logging (so we can see backend-auth errors during bring-up);
# set to 0 once everything is working.
verbose = 1
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
ignore_startup_parameters = extra_float_digits
