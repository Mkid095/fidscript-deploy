[databases]
; Per-database entries are added dynamically by the platform.
; Format: dbname = host=... port=... dbname=...
; Default postgres for the platform DB (fidscript):
fidscript = host=fidscript_postgres port=5432 dbname=fidscript

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 100
ignore_startup_parameters = extra_float_digits
