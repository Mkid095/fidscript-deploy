server_name: fidscript_nats

listen: 0.0.0.0:4222

http_port: 8222

websocket {
  port: 9222
  no_tls: false
}

max_payload: 8MB
max_connections: 1000

jetstream {
  store_dir: /data/jetstream
  max_memory_store: 1GB
  max_file_store: 10GB
  domain: fidscript
}

cluster {
  name: fidscript
  port: 6222
  routes: []
}

auth_timeout: 5
max_auth_attempts: 10

logging {
  debug: false
  trace: false
  logtime: true
  connect: true
}
