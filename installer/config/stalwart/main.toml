# Stalwart Mail Server — main.toml
# Rendered at install time with ${VARIABLE} substitution.
# TLS: Stalwart uses its own ACME client (HTTP-01 challenge routed through Traefik).
# Storage: uses the platform Postgres (shared) or SQLite (standalone).

[server]
  hostname = "${MAIL_HOSTNAME}"
  protocol.log = true
  trust-x-client-id = true

# Inbound SMTP (port 25) — receive from external MTAs
[server.inbound]
  hostname = "${MAIL_HOSTNAME}"
  protocols = ["smtp"]
  tls.enable = false

# SMTP submission (port 587) — authenticated outbound
[server.submission]
  hostname = "submit.${MAIL_HOSTNAME}"
  protocols = ["smtp"]
  auth.credentials = "/run/secrets/stalwart_credentials"

# IMAP (port 993) — mailbox access
[server.imap]
  hostname = "imap.${MAIL_HOSTNAME}"
  tls.enable = true

# JMAP / management HTTP API (port 443 via Traefik)
[jmap]
  hostname = "jmap.${MAIL_HOSTNAME}"
  url = "https://jmap.${MAIL_DOMAIN}"
  push.enabled = true
  admin-secret = "${STA_ADMIN_TOKEN}"

# TLS via Stalwart's built-in ACME (HTTP-01 challenge served by Traefik)
[tls]
  certificate = "acme"
  acme.provider = "letsencrypt-staging"
  acme.domains = ["${MAIL_DOMAIN}", "*.${MAIL_DOMAIN}"]
  acme.http-port = 80
  acme.http-challenge = true
  acme.storage = "/data/acme"

# Storage — SQLite is fine for a self-hosted VPS mail server
[storage]
  type = "sqlite"
  path = "/data/db"

[storage.blob]
  type = "filesystem"
  path = "/data/blobs"

# DKIM signing — keys generated and rotated automatically
[dkim]
  enabled = true
  selector = "default"
  path = "/data/dkim"
  rotation = "90d"

# Outbound delivery
[outbound]
  next-hop = ["127.0.0.1:10025"]

[report]
  dkim = true
  dmarc = true
  disposition = ["none", "quarantine", "reject"]
