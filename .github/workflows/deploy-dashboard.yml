name: Deploy Dashboard

on:
  workflow_dispatch:
    inputs:
      vps_host:
        description: 'VPS IP address'
        required: true
        default: '72.61.89.110'
      vps_port:
        description: 'VPS SSH port'
        required: false
        default: '22'
      image_tag:
        description: 'Dashboard image tag'
        required: true
        default: 'app-20260621'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull dashboard image from GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u mkid095 --password-stdin
          docker pull "ghcr.io/mkid095/dashboard:${{ inputs.image_tag }}"
          docker tag "ghcr.io/mkid095/dashboard:${{ inputs.image_tag }}" docker-dashboard:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ inputs.vps_host }}
          port: ${{ inputs.vps_port }}
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd /data/fidscript/docker
            docker pull ghcr.io/mkid095/dashboard:${{ inputs.image_tag }}
            docker tag ghcr.io/mkid095/dashboard:${{ inputs.image_tag }} docker-dashboard:latest
            docker compose up -d dashboard --no-deps
            docker image prune -f -a --filter "until=168h" 2>/dev/null || true
